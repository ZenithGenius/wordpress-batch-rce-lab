<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} :: {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    @font-face {
      font-family: "JetBrains Mono";
      src: url("{{ '/assets/fonts/jetbrains-mono-var.woff2' | relative_url }}") format("woff2");
      font-weight: 100 800; font-style: normal; font-display: swap;
    }

    /* Incident-log terminal. Void black, one alert-red accent, one ok-green
       accent for the patched/fixed state. No blur, no gradients-as-decor:
       the atmosphere comes from scanlines and hairlines, not glass. */
    :root {
      --void:    #0a0b0d;
      --panel:   #121417;
      --panel-2: #17191c;
      --line:    #23262b;
      --line-2:  #32363d;
      --ink:     #e9ebed;
      --dim:     #8a9099;
      --faint:   #565b62;

      --alert:     #ff4433;   /* vulnerable / critical */
      --alert-dim: color-mix(in oklab, var(--alert) 42%, transparent);
      --ok:        #33d17a;   /* patched / fixed */
      --ok-dim:    color-mix(in oklab, var(--ok) 42%, transparent);
      --amber:     #ffb020;   /* CVE ids, secondary emphasis */

      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --shell: 64rem;
      --read: 40rem;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

    body {
      margin: 0; color: var(--ink);
      font-family: var(--mono); font-size: 1rem; line-height: 1.7;
      font-weight: 400; letter-spacing: -0.005em;
      background: var(--void);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }

    main { animation: rise 0.4s ease-out both; }
    @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { main { animation: none; } }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { display: inline-block; width: 0.55em; height: 1em; background: var(--alert);
              vertical-align: -0.15em; margin-left: 0.05em; animation: blink 1.1s step-end infinite; }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; opacity: 1; } }

    /* ---- masthead ---- */
    .masthead {
      position: sticky; top: 0; z-index: 20;
      background: color-mix(in oklab, var(--void) 88%, transparent);
      border-bottom: 1px solid var(--line);
    }
    .masthead-in {
      max-width: var(--shell); margin: 0 auto;
      padding: 0.95rem 1.5rem; display: flex; align-items: baseline;
      justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .brand { font-weight: 700; font-size: 0.92rem; letter-spacing: -0.01em; color: var(--ink); text-decoration: none; }
    .brand b { color: var(--alert); font-weight: 700; }
    .masthead-in nav { display: flex; gap: 1.3rem; font-size: 0.78rem; }
    .masthead-in nav a { color: var(--dim); text-decoration: none; }
    .masthead-in nav a::before { content: "/"; color: var(--faint); margin-right: 0.15rem; }
    .masthead-in nav a:hover { color: var(--alert); }

    /* ---- hero (signature component: alert console readout) ---- */
    .hero {
      position: relative; overflow: hidden; margin: 0 0 2.5rem;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--panel);
    }
    .hero::before {
      /* scanlines, faint, atmosphere only */
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
      background: repeating-linear-gradient(to bottom, transparent 0 3px, color-mix(in oklab, white 2.5%, transparent) 3px 4px);
    }
    .hero::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(50rem 24rem at 50% -20%, color-mix(in oklab, var(--alert) 12%, transparent), transparent 70%);
    }
    .hero-in { position: relative; padding: 2.4rem 1.75rem 2rem; }
    .pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--alert); border: 1px solid var(--alert-dim); border-radius: 3px;
      padding: 0.3rem 0.6rem 0.3rem 0.5rem; margin-bottom: 1.4rem;
    }
    .pill::before { content: ""; width: 0.45rem; height: 0.45rem; border-radius: 50%; background: var(--alert);
                     box-shadow: 0 0 8px var(--alert); animation: blink 1.6s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .pill::before { animation: none; } }

    .hero h1 { font-size: clamp(2.1rem, 1.5rem + 2.6vw, 3.4rem); font-weight: 800; letter-spacing: -0.02em;
                line-height: 1.05; margin: 0 0 1rem; }
    .hero .lede { max-width: 42rem; font-size: 1.02rem; line-height: 1.65; color: var(--dim); margin: 0 0 2rem; }

    .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr)); gap: 1px;
            background: var(--line); border: 1px solid var(--line); border-radius: 4px; overflow: hidden;
            max-width: var(--shell); }
    .meta div { background: var(--panel-2); padding: 0.7rem 0.9rem; }
    .meta .k { display: block; font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.3rem; }
    .meta .v { font-size: 0.86rem; color: var(--ink); font-weight: 600; }
    .meta .v.alert { color: var(--alert); }
    .meta .v.ok { color: var(--ok); }
    .meta .v.amber { color: var(--amber); }

    /* ---- shell / article ---- */
    .shell { max-width: var(--shell); margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    article { max-width: var(--read); }
    article > pre, article > table, article > .mermaid, article > .meta, article > .hero,
    article > p:has(> img) { max-width: var(--shell); width: 100%; }

    /* index.md has no h1 rendered by layout chrome; article content owns its own h1 */
    article > h1:first-child { font-size: clamp(1.9rem, 1.5rem + 1.6vw, 2.6rem); font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.1; margin: 0 0 0.9rem; max-width: var(--shell); }
    article > h1:first-child + p { color: var(--dim); font-size: 1rem; max-width: var(--read); margin-bottom: 2.2rem; }

    a { color: var(--amber); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 0.16em;
        text-decoration-color: color-mix(in oklab, var(--amber) 45%, transparent); }
    a:hover { color: var(--ink); text-decoration-color: var(--amber); }

    h2 {
      counter-increment: sec; font-size: clamp(1.28rem, 1.1rem + 0.7vw, 1.55rem); font-weight: 700;
      letter-spacing: -0.015em; color: var(--ink);
      margin: 3.4rem 0 1.1rem; padding-top: 1.6rem; border-top: 1px solid var(--line);
      scroll-margin-top: 4.5rem; display: flex; align-items: baseline; gap: 0.7rem;
    }
    h2::before {
      content: "[" counter(sec, decimal-leading-zero) "]";
      font-size: 0.74rem; font-weight: 700; color: var(--alert); flex: none;
    }
    article { counter-reset: sec; }
    h3 { font-size: 1.08rem; font-weight: 700; color: var(--ink); margin: 2rem 0 0.6rem; scroll-margin-top: 4.5rem; }
    h4 { font-size: 0.94rem; font-weight: 700; color: var(--dim); margin: 1.5rem 0 0.4rem; }
    p, ul, ol { margin: 0 0 1.1rem; }
    li { margin: 0.3rem 0; padding-left: 0.1rem; }
    li::marker { color: var(--alert); content: "- "; }
    strong { font-weight: 700; color: var(--ink); }

    p > em:only-child {
      display: block; font-style: normal; font-size: 0.78rem; color: var(--faint);
      border-left: 2px solid var(--line-2); padding-left: 0.7rem; margin: -0.4rem 0 1.4rem;
    }

    code {
      font-family: var(--mono); font-size: 0.87em;
      background: color-mix(in oklab, var(--amber) 12%, transparent);
      color: var(--amber);
      padding: 0.08em 0.38em; border-radius: 3px;
      border: 1px solid color-mix(in oklab, var(--amber) 22%, transparent);
    }
    pre {
      background: var(--panel); color: var(--ink);
      padding: 1.6rem 1.15rem 1.05rem; border-radius: 6px; border: 1px solid var(--line);
      overflow-x: auto; font-size: 0.82rem; line-height: 1.62; margin: 1.4rem 0;
      position: relative;
    }
    /* terminal window chrome: three dots, top-left */
    pre::before {
      content: "\25CF \25CF \25CF"; position: absolute; top: 0.55rem; left: 0.9rem;
      font-size: 0.55rem; letter-spacing: 0.35em; color: var(--line-2);
    }
    pre code { background: none; border: none; padding: 0; font-size: inherit; color: inherit; }

    blockquote {
      margin: 1.6rem 0; padding: 0.9rem 1.1rem; border-radius: 4px;
      background: var(--panel); color: var(--dim);
      font-size: 0.94rem; border: 1px solid var(--line); border-left: 2px solid var(--amber);
    }
    blockquote p:last-child { margin-bottom: 0; }

    img { max-width: 100%; height: auto; display: block; border: 1px solid var(--line); border-radius: 6px; margin: 1.5rem 0 0.5rem; }

    table { width: 100%; border-collapse: collapse; margin: 1.6rem 0; font-size: 0.88rem;
            display: block; overflow-x: auto; background: var(--panel);
            border: 1px solid var(--line); border-radius: 6px; padding: 0.2rem 0.9rem; }
    th, td { text-align: left; padding: 0.6rem 0.85rem 0.6rem 0; border-bottom: 1px solid var(--line); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    th { font-weight: 700; color: var(--alert); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
         border-bottom: 1px solid var(--line-2); white-space: nowrap; }
    td:not(:last-child), th:not(:last-child) { padding-right: 1.6rem; }

    hr { border: 0; border-top: 1px solid var(--line); margin: 2.6rem 0; max-width: 100%; }

    .mermaid { margin: 1.8rem 0; text-align: center; background: var(--panel);
               border: 1px solid var(--line); border-radius: 6px; padding: 1.3rem 1rem; }
    .mermaid svg { max-width: 100%; height: auto; }

    .site-foot {
      max-width: var(--shell); margin: 0 auto; padding: 1.6rem 1.5rem 3.5rem;
      border-top: 1px solid var(--line); color: var(--faint); font-size: 0.78rem;
    }
    .site-foot::before { content: "$ tail -f incident.log"; display: block; color: var(--line-2); margin-bottom: 0.6rem; }
    .site-foot a { color: var(--dim); }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-in">
      <a class="brand" href="{{ '/' | relative_url }}"><b>wp2shell</b>_<span class="cursor" aria-hidden="true"></span></a>
      <nav>
        <a href="{{ '/analysis/mechanism.html' | relative_url }}">mechanism</a>
        <a href="{{ '/analysis/detection.html' | relative_url }}">detection</a>
        <a href="{{ '/analysis/IOCs.html' | relative_url }}">mitigate</a>
        <a href="https://github.com/ZenithGenius/wordpress-batch-rce-lab/tree/main/batch-rce-lab">lab</a>
        <a href="https://github.com/ZenithGenius/wordpress-batch-rce-lab">repo</a>
      </nav>
    </div>
  </header>

  <div class="shell">
    <article>
      {{ content }}
    </article>
  </div>

  <footer class="site-foot">
    Isaac Joumessi. Written up for defensive and educational use after WordPress's public fix.
    No exploit payload is published.
  </footer>

  <script src="{{ '/assets/mermaid.min.js' | relative_url }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("code.language-mermaid, .language-mermaid").forEach(function (el) {
        var host = el.closest(".language-mermaid") || el;
        var div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = el.textContent;
        host.replaceWith(div);
      });
      var theme = {
        primaryColor: "#17191c", primaryBorderColor: "#ff4433", primaryTextColor: "#e9ebed",
        lineColor: "#8a9099", secondaryColor: "#121417", tertiaryColor: "#0a0b0d",
        fontSize: "14px"
      };
      theme.fontFamily = '"JetBrains Mono", ui-monospace, monospace';
      mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "base",
                           themeVariables: theme, flowchart: { curve: "basis", padding: 12 } });
      mermaid.run({ querySelector: ".mermaid" });
    });
  </script>
</body>
</html>
